name: terraform-apply-application

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  apply-dev:
    runs-on: ubuntu-latest
    environment: dev
    concurrency:
      group: release-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_wrapper: false

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}
          audience: api://AzureADTokenExchange

      - name: Apply application (demo)
        working-directory: terraform/application
        run: |
          terraform init \
            -backend-config="resource_group_name=${{ vars.TFSTATE_RG }}" \
            -backend-config="storage_account_name=${{ vars.TFSTATE_STORAGE_ACCOUNT }}" \
            -backend-config="container_name=${{ vars.TFSTATE_APPLICATION_CONTAINER_DEV }}" \
            -backend-config="key=application-dev.tfstate"
          terraform apply -auto-approve \
            -var-file=../environments/dev/application.tfvars \
            -var="sql_admin_login=${{ vars.SQL_ADMIN_LOGIN }}" \
            -var="sql_admin_password=${{ secrets.SQL_ADMIN_PASSWORD }}" \
            -var="entra_admin_login=${{ vars.ENTRA_ADMIN_LOGIN }}" \
            -var="entra_admin_object_id=${{ vars.ENTRA_ADMIN_OBJECT_ID }}"

  apply-prod:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    concurrency:
      group: release-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_wrapper: false

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}
          audience: api://AzureADTokenExchange

      - name: Apply application (prod)
        working-directory: terraform/application
        run: |
          terraform init \
            -backend-config="resource_group_name=${{ vars.TFSTATE_RG }}" \
            -backend-config="storage_account_name=${{ vars.TFSTATE_STORAGE_ACCOUNT }}" \
            -backend-config="container_name=${{ vars.TFSTATE_APPLICATION_CONTAINER_PROD }}" \
            -backend-config="key=application-prod.tfstate"
          terraform apply -auto-approve \
            -var-file=../environments/prod/application.tfvars \
            -var="sql_admin_login=${{ vars.SQL_ADMIN_LOGIN }}" \
            -var="sql_admin_password=${{ secrets.SQL_ADMIN_PASSWORD }}" \
            -var="entra_admin_login=${{ vars.ENTRA_ADMIN_LOGIN }}" \
            -var="entra_admin_object_id=${{ vars.ENTRA_ADMIN_OBJECT_ID }}"