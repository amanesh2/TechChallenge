name: seed-database

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  seed:
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm install

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}
          audience: api://AzureADTokenExchange

      - name: Add temporary SQL firewall rule for runner
        id: fw
        run: |
          RUNNER_IP=$(curl -s https://api.ipify.org)
          echo "runner_ip=${RUNNER_IP}" >> "$GITHUB_OUTPUT"
          az sql server firewall-rule create \
            --resource-group "${{ vars.SQL_RESOURCE_GROUP }}" \
            --server "${{ vars.SQL_SERVER_NAME }}" \
            --name "jit-gha-${{ github.run_id }}" \
            --start-ip-address "${RUNNER_IP}" \
            --end-ip-address "${RUNNER_IP}"

      - name: Seed database
        env:
          SQL_SERVER_FQDN: ${{ vars.SQL_SERVER_FQDN }}
          SQL_DATABASE_NAME: ${{ vars.SQL_DATABASE_NAME }}
          APP_UAMI_NAME: ${{ vars.APP_UAMI_NAME }}
          SEEDER_UAMI_NAME: ${{ vars.SEEDER_UAMI_NAME }}
        run: |
          node scripts/provision-database-principals.js
          node scripts/seed-database.js

      - name: Remove temporary SQL firewall rule
        if: always()
        run: |
          az sql server firewall-rule delete \
            --resource-group "${{ vars.SQL_RESOURCE_GROUP }}" \
            --server "${{ vars.SQL_SERVER_NAME }}" \
            --name "jit-gha-${{ github.run_id }}"